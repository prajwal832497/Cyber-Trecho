<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMS BOND 770</title>
    <style>
        body { margin: 0; background: #e67e22; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; }
        canvas { display: block; image-rendering: pixelated; } 
        
        /* Main Menu Styles */
        #main-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 20, 0.9); display: flex; align-items: center; justify-content: center; flex-direction: column; color: #fff; z-index: 20; }
        .game-title { font-size: 100px; margin: 0; color: #ffcc00; text-shadow: 6px 6px 0px #8b0000; text-transform: uppercase; letter-spacing: 4px; text-align: center; }
        
        .difficulty-selector { margin: 40px 0 20px 0; display: flex; gap: 20px; }
        .diff-btn { background: #2c3e50; border: 2px solid #7f8c8d; color: #ecf0f1; padding: 10px 20px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 6px; transition: 0.2s; font-family: inherit; }
        .diff-btn:hover { background: #34495e; border-color: #bdc3c7; }
        .diff-btn.active { background: #8b0000; border-color: #ffcc00; color: #ffcc00; box-shadow: 0 0 15px rgba(255, 204, 0, 0.5); }
        
        #start-btn { background: #ffcc00; color: #1a0000; border: none; padding: 15px 40px; font-size: 28px; font-weight: 900; cursor: pointer; border-radius: 8px; margin-top: 10px; text-transform: uppercase; transition: transform 0.1s, background 0.2s; box-shadow: 0 6px 0px #d35400; }
        #start-btn:active { transform: translateY(6px); box-shadow: 0 0px 0px #d35400; }
        #start-btn:hover { background: #ffe066; }

        .credits { position: absolute; bottom: 30px; text-align: center; font-size: 18px; color: #bdc3c7; letter-spacing: 1px; line-height: 1.5; }
        .credits span { color: #06d6a0; font-weight: bold; }

        /* In-Game UI */
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; text-shadow: 2px 2px 0px rgba(0,0,0,0.8); display: none; }
        .title { font-size: 34px; font-weight: 900; color: #ffcc00; letter-spacing: 2px; text-transform: uppercase; text-shadow: 3px 3px 0px #8b0000; }
        .stats { font-size: 24px; font-weight: bold; margin-top: 10px; color: #fff; }
        .hp-bar { width: 300px; height: 24px; background: #34495e; border: 3px solid #ffcc00; margin-top: 10px; border-radius: 4px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #hp-fill { height: 100%; background: #06d6a0; width: 100%; transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 20, 0.9); display: none; align-items: center; justify-content: center; flex-direction: column; color: #fff; z-index: 10; }
        #overlay h1 { font-size: 80px; margin: 0; color: #ffcc00; text-shadow: 4px 4px 0px #8b0000; text-transform: uppercase; }
        #overlay p { font-size: 24px; color: #ecf0f1; margin-top: 10px; font-weight: bold; cursor: pointer; }
        #overlay p:hover { color: #ffcc00; text-decoration: underline; }
        
        #controls { position: absolute; bottom: 20px; left: 20px; color: #fff; font-size: 16px; font-weight: bold; pointer-events: none; background: rgba(139, 0, 0, 0.8); padding: 12px 18px; border-radius: 8px; border: 2px solid #ffcc00; box-shadow: 0 4px 8px rgba(0,0,0,0.5); display: none; }
        .highlight { color: #ffcc00; font-size: 18px; text-shadow: 1px 1px 0px #000; }
        .objective { color: #06d6a0; margin-top: 5px; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="main-menu">
        <h1 class="game-title">GEMS BOND 770</h1>
        
        <div class="difficulty-selector">
            <button class="diff-btn" data-diff="easy">EASY</button>
            <button class="diff-btn active" data-diff="normal">NORMAL</button>
            <button class="diff-btn" data-diff="hard">HARD</button>
        </div>

        <button id="start-btn">START TO PLAY</button>
        
        <div class="credits">
            Game made by Team T9<br>
            <span>Mahanth</span> & <span>Prajwal</span>
        </div>
    </div>

    <div id="ui">
        <div class="title">GEMS BOND 770</div>
        <div class="hp-bar"><div id="hp-fill"></div></div>
        <div class="stats">ANCIENT CORES: <span id="stars">0</span> / 15</div>
        <div class="objective" id="objective-text">Collect 15 Cores to activate the Portal!</div>
    </div>
    
    <div id="controls">
        [A/D] MOVE | [SPACE] JUMP | [CLICK] MAGIC BOLT | <span class="highlight">[G] FLIP GRAVITY</span>
    </div>

    <div id="overlay">
        <h1 id="end-title">PORTAL BREACHED</h1>
        <p onclick="location.reload()">Click here to restart sequence.</p>
    </div>

    <canvas id="game"></canvas>

<script>
    'use strict';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let w, h, frames = 0;
    let camera = { x: 0, y: 0 };
    const keys = {};
    let gameState = 'menu'; 
    
    // Difficulty Modifiers
    let currentDifficulty = 'normal';
    let diffMods = {
        easy: { dmg: 0.5, speed: 0.7, fireRate: 1.5 },
        normal: { dmg: 1.0, speed: 1.0, fireRate: 1.0 },
        hard: { dmg: 2.0, speed: 1.4, fireRate: 0.6 }
    };
    
    const WORLD = { w: 4000, h: 3200, gravity: 0.35, gravityDir: 1, friction: 0.82 };
    let entities = { platforms: [], enemies: [], bullets: [], ambient: [], stars: [], gate: null, 
                     castleBg: {sky: null, clouds: [], birds: [], mountains: []},
                     castleMG: {grass: [], river: null, riverReflection: null, bridge: null, castleStructure: null},
                     castleFG: { grassSilhouette: [] } };

    function drawDetailedLimb(x, y, angle, length, thickness, baseColor, shadowColor) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.fillStyle = shadowColor;
        ctx.beginPath(); ctx.roundRect(-thickness/2 - 2, -2, thickness + 4, length + 4, thickness/2); ctx.fill();
        ctx.fillStyle = baseColor;
        ctx.beginPath(); ctx.roundRect(-thickness/2, 0, thickness, length, thickness/2); ctx.fill();
        ctx.restore();
    }

    class Player {
        constructor() {
            this.x = 200; this.y = WORLD.h - 100; this.w = 32; this.h = 48;
            this.vx = 0; this.vy = 0; 
            this.speed = 0.85; 
            this.hp = 100; this.stars = 0;
            this.isGrounded = false; this.canDoubleJump = false;
            this.jumpHeld = false; this.gravityToggleHeld = false;
            this.cooldown = 0; this.animTimer = 0;
        }

        update() {
            if (gameState !== 'playing') return;
            this.cooldown--;

            if (keys['KeyG'] && !this.gravityToggleHeld) {
                WORLD.gravityDir *= -1; 
                this.gravityToggleHeld = true;
                burst(this.x + this.w/2, this.y + this.h/2, "#ffcc00", 20); 
            } else if (!keys['KeyG']) {
                this.gravityToggleHeld = false;
            }

            if (keys['KeyD'] || keys['ArrowRight']) this.vx += this.speed;
            if (keys['KeyA'] || keys['ArrowLeft']) this.vx -= this.speed;
            
            this.vx *= WORLD.friction;
            this.vy += WORLD.gravity * WORLD.gravityDir;
            
            if (keys['Space'] || keys['KeyW'] || keys['ArrowUp']) {
                if (this.isGrounded) {
                    this.vy = -11 * WORLD.gravityDir;
                    this.isGrounded = false;
                    burst(this.x + this.w/2, WORLD.gravityDir === 1 ? this.y + this.h : this.y, "#fff"); 
                } else if (this.canDoubleJump && !this.jumpHeld) {
                    this.vy = -10 * WORLD.gravityDir;
                    this.canDoubleJump = false;
                    burst(this.x + this.w/2, WORLD.gravityDir === 1 ? this.y + this.h : this.y, "#3498db"); 
                }
                this.jumpHeld = true;
            } else {
                this.jumpHeld = false;
            }

            this.x += this.vx;
            if (this.x < 0) { this.x = 0; this.vx = 0; }
            if (this.x > WORLD.w - this.w) { this.x = WORLD.w - this.w; this.vx = 0; }

            for (let p of entities.platforms) {
                if (this.y + this.h > p.y && this.y < p.y + p.h) {
                    if (this.vx > 0 && this.x + this.w > p.x && this.x < p.x) { this.x = p.x - this.w; this.vx = 0; }
                    if (this.vx < 0 && this.x < p.x + p.w && this.x + this.w > p.x + p.w) { this.x = p.x + p.w; this.vx = 0; }
                }
            }

            this.y += this.vy;
            this.isGrounded = false;

            for (let p of entities.platforms) {
                if (this.x + this.w > p.x && this.x < p.x + p.w) {
                    if (WORLD.gravityDir === 1) { 
                        if (this.vy > 0 && this.y + this.h >= p.y && this.y + this.h <= p.y + 25) {
                            this.y = p.y - this.h; this.vy = 0; this.isGrounded = true; this.canDoubleJump = true;
                        } else if (this.vy < 0 && this.y <= p.y + p.h && this.y >= p.y + p.h - 25) {
                            this.y = p.y + p.h; this.vy = 0;
                        }
                    } else { 
                        if (this.vy < 0 && this.y <= p.y + p.h && this.y >= p.y + p.h - 25) {
                            this.y = p.y + p.h; this.vy = 0; this.isGrounded = true; this.canDoubleJump = true;
                        } else if (this.vy > 0 && this.y + this.h >= p.y && this.y + this.h <= p.y + 25) {
                            this.y = p.y - this.h; this.vy = 0;
                        }
                    }
                }
            }

            if (this.y < 0) { this.y = 0; this.vy = 0; if (WORLD.gravityDir === -1) this.isGrounded = true; }
            if (this.y > WORLD.h - this.h) { this.y = WORLD.h - this.h; this.vy = 0; if (WORLD.gravityDir === 1) this.isGrounded = true; }

            camera.x += ((this.x - w / 2) - camera.x) * 0.1;
            camera.y += ((this.y - h / 2) - camera.y) * 0.1; 
            
            if (camera.x < 0) camera.x = 0;
            if (camera.x > WORLD.w - w) camera.x = WORLD.w - w;
            if (camera.y < 0) camera.y = 0;
            if (camera.y > WORLD.h - h) camera.y = WORLD.h - h;

            if (Math.abs(this.vx) > 0.5 && this.isGrounded) this.animTimer += 0.35;
            else this.animTimer = 0;
        }

        draw() {
            ctx.save(); 
            ctx.translate(this.x - camera.x + this.w/2, this.y - camera.y + this.h/2);
            ctx.scale(1, WORLD.gravityDir); 
            
            let scaleY = 1; let scaleX = 1;
            if (!this.isGrounded && this.vy * WORLD.gravityDir < 0) { scaleY = 1.1; scaleX = 0.9; } 
            else if (!this.isGrounded && this.vy * WORLD.gravityDir > 0) { scaleY = 0.9; scaleX = 1.1; } 
            
            ctx.scale(scaleX, scaleY);
            ctx.translate(-this.w/2, -this.h/2);

            let swing = Math.sin(this.animTimer) * 0.8;
            if (!this.isGrounded) swing = Math.PI / 5; 

            drawDetailedLimb(this.w/2, this.h/2, -swing, 16, 6, "#2c3e50", "#1a0000"); 
            drawDetailedLimb(this.w/2, this.h - 14, swing, 18, 8, "#1a0000", "#100000"); 

            ctx.fillStyle = "#8b0000"; ctx.beginPath(); ctx.roundRect(0, 8, this.w, 30, 6); ctx.fill();
            ctx.fillStyle = "#f39c12"; ctx.beginPath(); ctx.roundRect(4, 10, this.w - 8, 26, 4); ctx.fill();
            
            ctx.fillStyle = "#e67e22"; ctx.fillRect(6, 22, this.w - 12, 6); 
            ctx.fillStyle = "#ffcc00"; ctx.fillRect(12, 21, 8, 8); 

            ctx.fillStyle = "#ffccbc"; ctx.beginPath(); ctx.arc(this.w/2 + (this.vx > 0 ? 2 : -2), 8, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#8b0000"; ctx.fillRect(0, 2, this.w, 8);

            ctx.fillStyle = "#ffcc00"; 
            let eyeDir = this.vx >= 0 ? 4 : -4;
            ctx.fillRect(this.w/2 + eyeDir, 6, 3, 4);

            drawDetailedLimb(this.w/2, this.h/2, swing, 16, 6, "#ffb74d", "#f39c12"); 
            drawDetailedLimb(this.w/2, this.h - 14, -swing, 18, 8, "#2c3e50", "#1a0000"); 

            ctx.restore();
        }
    }

    class Platform {
        constructor(x, y, w, h) { this.x = x; this.y = y; this.w = w; this.h = h; }
        draw() {
            ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y);
            ctx.fillStyle = "#3e2723"; ctx.fillRect(0, 0, this.w, this.h);
            
            ctx.fillStyle = "#5d4037"; 
            for(let by=0; by<this.h; by+=20) {
                let offset = (by % 40 === 0) ? 0 : 20;
                for(let bx=-offset; bx<this.w; bx+=40) {
                    ctx.fillRect(bx+1, by+1, 38, 18);
                    ctx.fillStyle = "#8d6e63"; ctx.fillRect(bx+1, by+1, 38, 2); 
                    ctx.fillStyle = "#2c3e50"; ctx.fillRect(bx+1, by+17, 38, 2); 
                    ctx.fillRect(bx+37, by+1, 2, 18);
                    ctx.fillStyle = "#5d4037"; 
                }
            }

            ctx.fillStyle = "#8b0000"; ctx.fillRect(0, 0, this.w, 8);
            ctx.fillStyle = "#b71c1c"; 
            for(let i=0; i<this.w; i+=10) {
                if (Math.random() > 0.3) ctx.fillRect(i, 8, 10, 4 + Math.random()*6);
            }
            
            ctx.strokeStyle = "#1a0000"; ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, this.w, this.h);
            ctx.restore();
        }
    }

    class Gate {
        constructor(x, y) { this.x = x; this.y = y; this.w = 120; this.h = 140; this.isOpen = false; }
        draw() {
            ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y);
            this.isOpen = (player.stars >= 15);

            ctx.fillStyle = "#1a0000"; ctx.beginPath(); ctx.roundRect(0, 0, this.w, this.h, 20); ctx.fill();
            ctx.fillStyle = "#8b0000"; ctx.beginPath(); ctx.roundRect(10, 10, this.w - 20, this.h - 10, 10); ctx.fill();

            if (this.isOpen) {
                ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.roundRect(15, 15, this.w-30, this.h-15, 5); ctx.fill();
                ctx.globalAlpha = 0.6 + Math.sin(frames * 0.1) * 0.4;
                ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.roundRect(20, 20, this.w-40, this.h-20, 5); ctx.fill();
                ctx.globalAlpha = 1;
                if (frames % 10 === 0) burst(this.x + this.w/2, this.y + this.h/2, "#ffcc00", 2);
            } else {
                ctx.fillStyle = "#2c3e50"; ctx.fillRect(15, 15, this.w/2 - 15, this.h-15); ctx.fillRect(this.w/2, 15, this.w/2 - 15, this.h-15);
                ctx.fillStyle = "#ff0000"; ctx.beginPath(); ctx.arc(this.w/2, this.h/2, 12, 0, Math.PI*2); ctx.fill();
            }
            ctx.restore();
        }
    }

    class Wraith {
        constructor(x, y) {
            this.x = x; this.y = y; this.w = 30; this.h = 40;
            this.active = true; 
            this.baseSpeed = 0.7; 
        }
        update() {
            if (gameState !== 'playing') return;
            
            let speed = this.baseSpeed * diffMods[currentDifficulty].speed;
            let pTargetX = player.x + player.w / 2;
            let pTargetY = player.y + player.h / 2;
            let angle = Math.atan2(pTargetY - (this.y + this.h/2), pTargetX - (this.x + this.w/2));
            
            this.x += Math.cos(angle) * speed;
            this.y += Math.sin(angle) * speed;
            
            if (this.x < player.x + player.w && this.x + this.w > player.x && this.y < player.y + player.h && this.y + this.h > player.y) {
                player.hp -= 0.5 * diffMods[currentDifficulty].dmg; 
                burst(player.x + 15, player.y + 20, "#8e44ad", 2);
                if (player.hp <= 0) endGame(false);
            }
        }
        draw() {
            ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y);
            ctx.translate(0, Math.sin(frames * 0.05) * 5);
            ctx.globalAlpha = 0.7;
            ctx.fillStyle = "#8e44ad"; ctx.beginPath(); ctx.roundRect(0, 0, this.w, this.h, 15); ctx.fill();
            let lookX = (player.x > this.x) ? 4 : -4;
            ctx.fillStyle = "#06d6a0"; ctx.beginPath(); ctx.arc(10 + lookX, 15, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(20 + lookX, 15, 3, 0, Math.PI*2); ctx.fill();
            ctx.globalAlpha = 1;
            if (frames % 10 === 0) burst(this.x + this.w/2, this.y + this.h, "#8e44ad", 1);
            ctx.restore();
        }
    }

    class Archer {
        constructor(x, y, upsideDown = false) {
            this.x = x; this.y = y; this.w = 34; this.h = 44;
            this.active = true; this.cooldown = Math.random() * 150 + 50; 
            this.dir = 1; this.patrolStart = x;
            this.upsideDown = upsideDown; this.state = 'idle';
        }
        update() {
            this.cooldown--;
            let dy = Math.abs(player.y - this.y);
            let dx = Math.abs(player.x - this.x);
            let speed = 0.8 * diffMods[currentDifficulty].speed;
            
            if (dx < 700 && dy < 500) {
                this.state = 'aiming';
                this.dir = player.x > this.x ? 1 : -1;
                
                if (this.cooldown <= 0) {
                    let bowX = this.x + this.w/2;
                    let bowY = this.upsideDown ? this.y + this.h - 15 : this.y + 15;
                    let pTargetX = player.x + player.w/2;
                    let pTargetY = player.y + player.h/2;
                    let angle = Math.atan2(pTargetY - bowY, pTargetX - bowX);
                    
                    entities.bullets.push(new Arrow(bowX, bowY, angle, 4.5 * diffMods[currentDifficulty].speed, false));
                    this.cooldown = (120 + Math.random() * 60) * diffMods[currentDifficulty].fireRate; 
                }
            } else {
                this.state = 'patrol';
                this.x += this.dir * speed;
                if (Math.abs(this.x - this.patrolStart) > 100) this.dir *= -1;
            }
        }
        draw() {
            ctx.save(); 
            ctx.translate(this.x - camera.x + this.w/2, this.y - camera.y + this.h/2);
            if (this.upsideDown) ctx.scale(1, -1);
            ctx.translate(-this.w/2, -this.h/2);

            ctx.fillStyle = "#1a252f"; ctx.beginPath(); ctx.roundRect(0, 0, this.w, this.h, 4); ctx.fill();
            ctx.fillStyle = "#34495e"; ctx.beginPath(); ctx.roundRect(2, 2, this.w-4, this.h-4, 2); ctx.fill();
            
            ctx.fillStyle = "#bdc3c7"; ctx.beginPath(); ctx.arc(this.w/2, 10, 14, Math.PI, 0); ctx.fill();
            ctx.fillStyle = "#7f8c8d"; ctx.fillRect(4, 10, this.w-8, 4); 
            ctx.fillStyle = "#ffcc00"; ctx.fillRect(this.dir === 1 ? 20 : 10, 8, 4, 4); 
            
            ctx.save();
            ctx.translate(this.w/2, 20);
            if (this.state === 'aiming') {
                let bowAngle = Math.atan2((player.y + player.h/2) - (this.y + 20), (player.x + player.w/2) - (this.x + this.w/2));
                if (this.upsideDown) bowAngle *= -1;
                ctx.rotate(bowAngle);
            } else { ctx.rotate(this.dir === 1 ? 0 : Math.PI); }
            
            ctx.strokeStyle = "#8b0000"; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(0, 0, 16, -Math.PI/2.5, Math.PI/2.5, false); ctx.stroke();
            ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(6, -15); ctx.lineTo(-5, 0); ctx.lineTo(6, 15); ctx.stroke();
            ctx.restore();
            ctx.restore();
        }
    }

    class Knight {
        constructor(x, y, upsideDown = false) {
            this.x = x; this.y = y; this.w = 40; this.h = 44;
            this.active = true; this.dir = 1; this.state = 'patrol';
            this.animTimer = 0; this.upsideDown = upsideDown;
            this.patrolStart = x;
        }
        update() {
            let dy = Math.abs(player.y - this.y);
            let dx = Math.abs(player.x - this.x);
            let sameGravity = (this.upsideDown && WORLD.gravityDir === -1) || (!this.upsideDown && WORLD.gravityDir === 1);
            let baseSpeed = diffMods[currentDifficulty].speed;

            if (sameGravity && dy < 80 && dx < 450) this.state = 'chase';
            else if (dx > 550 || !sameGravity) this.state = 'patrol';

            if (this.state === 'chase') {
                this.dir = player.x > this.x ? 1 : -1;
                this.x += this.dir * 2.8 * baseSpeed; 
                this.animTimer += 0.4;
                if (dx < this.w && dy < this.h) {
                    player.hp -= 0.5 * diffMods[currentDifficulty].dmg; 
                    burst(player.x + 15, player.y + 20, "#e74c3c", 2);
                    if (player.hp <= 0) endGame(false);
                }
            } else {
                this.x += this.dir * 0.8 * baseSpeed; 
                this.animTimer += 0.15;
                if (Math.abs(this.x - this.patrolStart) > 150) this.dir *= -1;
            }
        }
        draw() {
            ctx.save(); 
            ctx.translate(this.x - camera.x + this.w/2, this.y - camera.y + this.h/2);
            if (this.upsideDown) ctx.scale(1, -1);
            ctx.translate(-this.w/2, -this.h/2);
            ctx.translate(this.w/2, this.h); ctx.rotate(Math.sin(this.animTimer)*0.15); ctx.translate(-this.w/2, -this.h);

            ctx.fillStyle = "#2c3e50"; ctx.beginPath(); ctx.roundRect(0, 0, this.w, this.h, 6); ctx.fill();
            ctx.fillStyle = "#bdc3c7"; ctx.beginPath(); ctx.roundRect(4, 4, this.w-8, this.h-8, 4); ctx.fill(); 
            ctx.fillStyle = "#2c3e50"; ctx.fillRect(this.dir === 1 ? 15 : 5, 8, 20, 8);
            ctx.fillStyle = "#ffcc00"; ctx.fillRect(this.dir === 1 ? 25 : 10, 10, 4, 4);
            ctx.fillStyle = "#95a5a6"; ctx.fillRect(this.dir === 1 ? 30 : -5, 20, 15, 6); 
            ctx.fillStyle = "#ecf0f1"; ctx.fillRect(this.dir === 1 ? 40 : -15, 10, 10, 30); 
            ctx.fillStyle = "#bdc3c7"; ctx.fillRect(this.dir === 1 ? 45 : -15, 10, 5, 30); 
            ctx.restore();
        }
    }

    class Arrow {
        constructor(x, y, angle, speed, isPlayer) {
            this.x = x; this.y = y; this.w = 24; this.h = 6;
            this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
            this.active = true; this.isPlayer = isPlayer; this.angle = angle;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            for (let p of entities.platforms) {
                if (this.x + this.w/2 > p.x && this.x - this.w/2 < p.x + p.w && this.y > p.y && this.y < p.y + p.h) {
                    this.active = false; burst(this.x, this.y, "#fff", 6); return;
                }
            }
            if (this.x < 0 || this.x > WORLD.w || this.y < 0 || this.y > WORLD.h) this.active = false;
        }
        draw() {
            ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y);
            ctx.rotate(this.angle);
            if (this.isPlayer) {
                ctx.shadowBlur = 15; ctx.shadowColor = "#3498db";
                ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.roundRect(-8, -3, 16, 6, 3); ctx.fill();
                ctx.fillStyle = "#3498db"; ctx.beginPath(); ctx.roundRect(-4, -1, 8, 2, 1); ctx.fill();
            } else {
                ctx.fillStyle = "#1a0000"; ctx.fillRect(-12, -1, 24, 2); 
                ctx.fillStyle = "#ffcc00"; ctx.beginPath(); ctx.moveTo(12, -4); ctx.lineTo(18, 0); ctx.lineTo(12, 4); ctx.fill(); 
                ctx.fillStyle = "#fff"; ctx.fillRect(-12, -3, 4, 6); 
            }
            ctx.restore();
        }
    }

    class Relic {
        constructor(x, y) { this.x = x; this.y = y; this.active = true; }
        draw() {
            ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y + Math.sin(frames * 0.05)*8);
            ctx.fillStyle = "#06d6a0"; ctx.shadowBlur = 15; ctx.shadowColor = "#06d6a0";
            ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(5,-5); ctx.lineTo(16,-5); ctx.lineTo(7,3); ctx.lineTo(10,14); ctx.lineTo(0,8); ctx.lineTo(-10,14); ctx.lineTo(-7,3); ctx.lineTo(-16,-5); ctx.lineTo(-5,-5); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(0, 2, 3, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y; this.color = color;
            this.vx = (Math.random() - 0.5) * 10; this.vy = (Math.random() - 0.5) * 10;
            this.life = 1.0; this.active = true;
        }
        update() {
            this.x += this.vx; this.y += this.vy; this.life -= 0.05;
            if (this.life <= 0) this.active = false;
        }
        draw() {
            ctx.save(); ctx.translate(this.x - camera.x, this.y - camera.y);
            ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.roundRect(0,0,5,5,2); ctx.fill(); ctx.restore();
        }
    }

    const player = new Player();

    function generateCastleBackground() {
        entities.castleBg = { sky: null, clouds: [], birds: [], mountains: [] };
        entities.castleMG = { grass: [], river: null, reflection: null, bridge: null, castleStructure: null };
        
        entities.castleBg.sky = ctx.createLinearGradient(0, 0, 0, h);
        entities.castleBg.sky.addColorStop(0, '#5DADE2'); 
        entities.castleBg.sky.addColorStop(1, '#8b0000'); 

        for(let i=0; i<15; i++) {
            entities.castleBg.clouds.push({ x: Math.random()*WORLD.w, y: 100 + Math.random()*200, w: 100 + Math.random()*150, h: Math.random()*40 });
        }
        entities.castleMG.castleStructure = { x: 500, y: WORLD.h - 500, w: 600, h: 400 };
    }

    function generateTower() {
        entities = { platforms: [], enemies: [], bullets: [], ambient: [], stars: [], gate: null, 
                     castleBg: {sky: null, clouds: [], birds: [], mountains: []},
                     castleMG: {grass: [], river: null, riverReflection: null, bridge: null, castleStructure: null},
                     castleFG: { grassSilhouette: [] } };
        
        generateCastleBackground();

        entities.platforms.push(new Platform(-50, 0, 50, WORLD.h)); 
        entities.platforms.push(new Platform(WORLD.w, 0, 50, WORLD.h)); 
        entities.platforms.push(new Platform(0, WORLD.h - 40, WORLD.w, 40)); 

        for (let i = 1; i <= 10; i++) {
            let fy = WORLD.h - (i * 280);
            let cx = 100;
            
            while (cx < WORLD.w - 300) {
                let pWidth = 250 + Math.random() * 350;
                entities.platforms.push(new Platform(cx, fy, pWidth, 40)); 
                
                if (Math.random() > 0.3) {
                    let upsideDown = Math.random() > 0.5; 
                    let spawnY = upsideDown ? fy + 40 : fy - 45;
                    let rand = Math.random();
                    
                    if (rand > 0.8) entities.enemies.push(new Wraith(cx + pWidth/2, fy - 150));
                    else if (i > 3 && rand > 0.4) entities.enemies.push(new Knight(cx + pWidth/2, spawnY, upsideDown));
                    else entities.enemies.push(new Archer(cx + pWidth/2, spawnY, upsideDown));
                }
                
                entities.platforms.push(new Platform(cx + pWidth + 40, fy + 140, 100, 20)); 
                cx += pWidth + 180 + Math.random() * 150; 
            }
        }

        while (entities.stars.length < 15) {
            let p = entities.platforms[Math.floor(Math.random() * entities.platforms.length)];
            if (p.y < WORLD.h - 500 && p.w > 200) entities.stars.push(new Relic(p.x + p.w/2, p.y - 70));
        }

        let topPlatforms = entities.platforms.filter(p => p.y < WORLD.h - 2500 && p.w > 200);
        let exitPlatform = topPlatforms[topPlatforms.length - 1]; 
        if (!exitPlatform) exitPlatform = entities.platforms[0]; 
        entities.gate = new Gate(exitPlatform.x + exitPlatform.w/2 - 60, exitPlatform.y - 140);

        player.x = 200; player.y = WORLD.h - 100;
        player.hp = 100; player.stars = 0; WORLD.gravityDir = 1;
        
        document.getElementById('ui').style.display = 'block';
        document.getElementById('controls').style.display = 'block';
        
        gameState = 'playing';
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('objective-text').innerText = "Collect 15 Cores to activate the Portal!";
        document.getElementById('objective-text').style.color = "#06d6a0";
    }

    function burst(x, y, color, count = 8) {
        for(let i=0; i<count; i++) entities.ambient.push(new Particle(x, y, color));
    }

    function drawBackground() {
        if (entities.castleBg && entities.castleBg.sky) {
            ctx.fillStyle = entities.castleBg.sky; 
        } else {
            let bg = ctx.createLinearGradient(0, 0, 0, h);
            bg.addColorStop(0, '#5DADE2'); bg.addColorStop(1, '#8b0000');
            ctx.fillStyle = bg;
        }
        ctx.fillRect(0, 0, w, h);

        ctx.save(); ctx.translate(-camera.x * 0.05, h*0.3 - camera.y * 0.05);
        ctx.fillStyle = "#34495e"; 
        for(let i=0; i<3; i++) {
            let bx = (frames * 0.5 + i * 50) % WORLD.w;
            let by = Math.sin(frames * 0.1 + i) * 20;
            ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx+5, by-5); ctx.lineTo(bx+10, by); ctx.stroke(); 
        }
        ctx.restore();

        if(entities.castleBg && entities.castleBg.clouds.length > 0) {
            ctx.fillStyle = "#bdc3c7"; 
            entities.castleBg.clouds.forEach(c => { ctx.fillRect(c.x - camera.x * 0.1, c.y - camera.y * 0.1, c.w, c.h); });
        }

        ctx.save(); ctx.translate(-camera.x * 0.2, h - camera.y * 0.2 - 200);
        ctx.fillStyle = "#8d6e63"; ctx.fillRect(0, 0, WORLD.w, 100);
        ctx.fillStyle = "#5d4037"; 
        for(let i=0; i<WORLD.w; i+=40) {
            if (frames % 20 < 10 && i % 80 == 0) continue;
            ctx.fillRect(i, 20, 20, 10 + Math.sin(frames * 0.1 + i) * 5);
        }
        ctx.restore();

        ctx.save(); ctx.translate(-camera.x * 0.2, h - camera.y * 0.2 - 400);
        ctx.fillStyle = "#34495e"; 
        let cx = 500, cy = WORLD.h - 500, cw = 600, ch = 400; 
        if(entities.castleMG && entities.castleMG.castleStructure) {
            cx = entities.castleMG.castleStructure.x; cw = entities.castleMG.castleStructure.w; ch = entities.castleMG.castleStructure.h;
        }
        ctx.fillRect(cx, 200 - ch, cw, ch);
        ctx.fillStyle = "#8d6e63"; ctx.fillRect(cx + 20, 200 - ch + 20, cw - 40, ch - 20);
        ctx.fillRect(cx - 20, 200 - ch - 100, 100, ch + 100);
        ctx.fillStyle = "#34495e"; ctx.fillRect(cx + 10, 200 - ch - 100, 20, ch + 100); 
        ctx.restore();
    }

    function engineTick() {
        if (gameState === 'playing') {
            player.update();
            entities.enemies.forEach(e => e.update());
            entities.bullets.forEach(b => b.update());
            entities.ambient.forEach(p => p.update());

            entities.bullets.forEach(b => {
                if (!b.active) return;
                if (b.isPlayer) {
                    entities.enemies.forEach(e => {
                        if (e.active && b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                            e.active = false; b.active = false; burst(e.x, e.y, "#ffcc00"); 
                        }
                    });
                } else {
                    if (b.x > player.x && b.x < player.x + player.w && b.y > player.y && b.y < player.y + player.h) {
                        b.active = false; 
                        player.hp -= 4 * diffMods[currentDifficulty].dmg; 
                        burst(player.x + 15, player.y + 20, "#3498db");
                        if (player.hp <= 0) endGame(false);
                    }
                }
            });

            entities.stars.forEach(s => {
                if (s.active && player.x < s.x + 20 && player.x + player.w > s.x - 20 && player.y < s.y + 20 && player.y + player.h > s.y - 20) {
                    s.active = false; player.stars++; 
                    player.hp = Math.min(100, player.hp + 25); 
                    burst(s.x, s.y, "#06d6a0", 20);
                    
                    if (player.stars >= 15) {
                        document.getElementById('objective-text').innerText = "PORTAL OPEN. ESCAPE!";
                        document.getElementById('objective-text').style.color = "#ffcc00";
                    }
                }
            });

            if (entities.gate && entities.gate.isOpen) {
                if (player.x < entities.gate.x + entities.gate.w && player.x + player.w > entities.gate.x && player.y < entities.gate.y + entities.gate.h && player.y + player.h > entities.gate.y) {
                    endGame(true);
                }
            }

            entities.bullets = entities.bullets.filter(b => b.active);
            entities.enemies = entities.enemies.filter(e => e.active);
            entities.ambient = entities.ambient.filter(a => a.active);
            entities.stars = entities.stars.filter(s => s.active);
        }

        drawBackground();
        
        if (gameState === 'playing' || gameState === 'won' || gameState === 'lost') {
            entities.platforms.forEach(p => p.draw());
            if (entities.gate) entities.gate.draw();
            entities.stars.forEach(s => s.draw());
            entities.enemies.forEach(e => e.draw());
            if (player.hp > 0) player.draw();
            entities.bullets.forEach(b => b.draw());
            entities.ambient.forEach(a => a.draw());

            document.getElementById('hp-fill').style.width = Math.max(0, player.hp) + '%';
            document.getElementById('stars').innerText = player.stars;
        }

        frames++;
        requestAnimationFrame(engineTick);
    }

    function endGame(win) {
        gameState = win ? 'won' : 'lost';
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('end-title').innerText = win ? "PORTAL BREACHED" : "AGENT DIED";
        document.getElementById('end-title').style.color = win ? "#ffcc00" : "#8b0000";
    }

    // UI Input Handling
    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentDifficulty = e.target.getAttribute('data-diff');
        });
    });

    document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('main-menu').style.display = 'none';
        generateTower();
    });

    window.addEventListener('keydown', e => { keys[e.code] = true; });
    window.addEventListener('keyup', e => { keys[e.code] = false; });
    
    window.addEventListener('mousedown', e => {
        // Prevent firing logic if clicking UI elements
        if (e.target.tagName === 'BUTTON' || gameState !== 'playing') return;
        
        if (player.cooldown <= 0) {
            let worldMouseX = e.clientX + camera.x;
            let worldMouseY = e.clientY + camera.y;
            let angle = Math.atan2(worldMouseY - (player.y + 20), worldMouseX - (player.x + 15));
            entities.bullets.push(new Arrow(player.x + 15, player.y + 20, angle, 18, true));
            player.cooldown = 12; 
        }
    });

    window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    generateCastleBackground(); 
    engineTick();
</script>
</body>
